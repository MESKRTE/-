<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギャラリー - オーバーロード「あなたの分身」作成ツール</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>みんなの分身 ギャラリー</h1>
            <p>みんなが作成したキャラクターが一覧で表示されます。<br>
               あなたも作成ツールから分身を公開してみましょう！</p>
            <div style="margin-top: 10px;">
                <a href="index.html" class="btn secondary" style="text-decoration: none; display: inline-block; width: auto; padding: 5px 15px;">← 作成ツールに戻る</a>
            </div>
        </header>

        <div class="gallery-container" id="gallery-container">
            <!-- ギャラリーアイテムがここに追加される -->
        </div>
    </div>
    
    <!-- Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modal-title">詳細</h3>
            <div id="modal-body" style="display:flex; flex-direction:column; gap:10px;">
                <!-- 詳細内容 -->
            </div>
        </div>
    </div>

    <script src="gallery.js"></script>
</body>
</html>
